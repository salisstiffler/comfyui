services:
  api:
    build: ./server
    container_name: comfy-ai-api
    ports:
      - "8100:8100"
    environment:
      - COMFYUI_SERVER=host.docker.internal:8188
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./server:/app
    restart: always
